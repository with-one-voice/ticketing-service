name: Deploy Show Service

on:
  push:
    branches: [develop]
    paths:
      - 'show/**'
      - '.github/workflows/deploy-show.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ✅ Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: 💾 Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🧪 Build show service
        run: ./gradlew :show:clean :show:build -x test

      - name: 🔖 Set Git SHA tag
        id: vars
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: 🐋 Docker Build & Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/show-service:${SHORT_SHA} -f show/Dockerfile .
          docker tag ${{ secrets.DOCKER_USERNAME }}/show-service:${SHORT_SHA} ${{ secrets.DOCKER_USERNAME }}/show-service:latest

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/show-service:${SHORT_SHA}
          docker push ${{ secrets.DOCKER_USERNAME }}/show-service:latest

      - name: 📜 Decode and save kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml

      - name: 🚀 Deploy to Kubernetes
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/show-service:${SHORT_SHA}|" show/k8s/deployment.yml
          kubectl --kubeconfig=kubeconfig.yaml apply -f show/k8s/
          kubectl --kubeconfig=kubeconfig.yaml rollout restart deployment show-service
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml