name: Java CI (Spring Boot MSA)

on:
  push:
    branches: [ "main", "develop", "release/**" ]
  pull_request:
    branches: [ "main", "develop", "release/**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 🔽 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🛠️ Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: 📦 Build infra modules (config, eureka, gateway) – test 제외
        run: ./gradlew :config:build :eureka:build :gateway:build -x test --no-daemon

      - name: 🧾 Show bootstrap.yml for debug
        run: |
          cat auth/src/test/resources/bootstrap.yml || echo "❌ bootstrap.yml NOT FOUND"


      - name: 🧪 Build & Test domain modules (Spring Cloud excluded)
        run: |
          ./gradlew \
            -PexcludeCloud \
            -Dspring.config.import=optional:classpath:/ \
            -Dspring.cloud.config.enabled=false \
            -Deureka.client.enabled=false \
            --no-daemon \
            :auth:test \
            :user:test \
            :show:test \
            :venue:test \
            :ticket:test \
            :seat:test \
            :payment:test \
            :notification:test \
            :admin:test
