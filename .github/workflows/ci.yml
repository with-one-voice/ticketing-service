name: Selective CI for MSA (Spring Boot)

on:
  pull_request:
    branches: [ "main", "develop", "release/**" ]

jobs:
  detect-changes:
    name: 🔍 Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - name: 📁 Detect changes in service modules
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            auth: 'auth/**'
            user: 'user/**'
            show: 'show/**'
            venue: 'venue/**'
            ticket: 'ticket/**'
            seat: 'seat/**'
            payment: 'payment/**'
            notification: 'notification/**'
            admin: 'admin/**'

  build-and-test:
    name: 🧪 Build & Test Changed Modules
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: 🔽 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🛠️ Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: 🧪 Run test for ${{ matrix.module }}
        run: |
          echo "🧪 Testing module: ${{ matrix.module }}"
          ./gradlew \
            -PexcludeCloud \
            -Dspring.config.import=optional:classpath:/ \
            -Dspring.cloud.config.enabled=false \
            -Deureka.client.enabled=false \
            --no-daemon \
            :${{ matrix.module }}:test

      - name: 📄 Show test report if failed
        if: failure()
        run: |
          echo "❗ Test failed for module: ${{ matrix.module }}"
          find . -type f -path "*/build/reports/tests/test/index.html" || echo "❌ No test report found"
