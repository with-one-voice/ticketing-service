name: Deploy Auth Service

on:
  push:
    branches: [ develop, "feature/**" ]
    paths:
      - 'auth/**'
      - '.github/workflows/deploy-auth.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    env:  # 공통 환경 변수
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      KUBECONFIG: ${{ secrets.KUBECONFIG }}

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ✅ Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: 🧪 Build JAR (auth + dependencies)
        run: ./gradlew :auth:build -x test

      - name: 🔖 Set Git SHA tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: 🐳 Docker Build & Push
        run: |
          echo "🔍 DOCKER_USERNAME = $DOCKER_USERNAME"
          echo "🔍 SHORT_SHA = $SHORT_SHA"
          
          docker build -t $DOCKER_USERNAME/auth-service:$SHORT_SHA .
          docker tag $DOCKER_USERNAME/auth-service:$SHORT_SHA $DOCKER_USERNAME/auth-service:latest
          
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker push $DOCKER_USERNAME/auth-service:$SHORT_SHA
          docker push $DOCKER_USERNAME/auth-service:latest

      - name: 🔐 Create Kubernetes Secret from GitHub Secrets
        run: |
          kubectl create secret generic onevoice-secret \
            --from-literal=DB_USERNAME=${{ secrets.DB_USERNAME }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: 🚀 Deploy to Kubernetes
        run: |
          sed -i "s|image: .*|image: $DOCKER_USERNAME/auth-service:$SHORT_SHA|" k8s/deployment.yaml
          kubectl apply -f k8s/
