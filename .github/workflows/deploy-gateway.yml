name: Deploy Gateway

on:
  push:
    branches: [ develop, "feature/**" ]
    paths:
      - 'gateway/**'
      - '.github/workflows/deploy-gateway.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ✅ Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: 🧪 Build project (gateway)
        run: ./gradlew :gateway:clean :gateway:build -x test

      - name: 🔖 Set Git SHA tag
        id: vars
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: 🐳 Docker Build & Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/gateway-service:${SHORT_SHA} -f gateway/Dockerfile .
          docker tag ${{ secrets.DOCKER_USERNAME }}/gateway-service:${SHORT_SHA} ${{ secrets.DOCKER_USERNAME }}/gateway-service:latest

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/gateway-service:${SHORT_SHA}
          docker push ${{ secrets.DOCKER_USERNAME }}/gateway-service:latest

      - name: 🧾 Decode and save kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml

      - name: 🚀 Deploy to Kubernetes
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/gateway-service:${SHORT_SHA}|" gateway-service/k8s/deployment.yml
          kubectl --kubeconfig=kubeconfig.yaml apply -f gateway/k8s/
