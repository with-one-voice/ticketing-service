name: Deploy Config Server

on:
  push:
    branches: [develop]
    paths:
      - 'config/**'
      - '.github/workflows/deploy-config.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ✅ Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: 💾 Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🧪 Build project
        run: ./gradlew :config:clean :config:build -x test

      - name: 🔖 Set Git SHA tag
        id: vars
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: 🐳 Docker Build & Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/config-server:${SHORT_SHA} -f config/Dockerfile .
          docker tag ${{ secrets.DOCKER_USERNAME }}/config-server:${SHORT_SHA} ${{ secrets.DOCKER_USERNAME }}/config-server:latest

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/config-server:${SHORT_SHA}
          docker push ${{ secrets.DOCKER_USERNAME }}/config-server:latest

      - name: 🔁 Push newTag to deploy with retry
        run: |
          git config --global user.name "$(git log -1 --pretty=format:'%an')"
          git config --global user.email "$(git log -1 --pretty=format:'%ae')"

          git fetch origin deploy
          git checkout deploy
          git pull --rebase origin deploy

          sed -i "s|newTag: .*|newTag: ${SHORT_SHA}|" config/k8s/overlays/prod/kustomization.yml

          git add config/k8s/overlays/prod/kustomization.yml
          git commit -m "chore: update config-server tag to ${SHORT_SHA}" || exit 0

          n=0
          until [ $n -ge 3 ]
          do
            git push https://x-access-token:${{ secrets.DEPLOY_PAT }}@github.com/with-one-voice/ticketing-service.git deploy && break
            n=$((n+1))
            echo "⚠️ Push failed. Retrying in 5 seconds... (attempt $n)"
            sleep 5
            git pull --rebase origin deploy
          done
