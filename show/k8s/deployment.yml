apiVersion: apps/v1
kind: Deployment
metadata:
  name: show-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: show
  template:
    metadata:
      labels:
        app: show
    spec:
      containers:
        - name: show
          image: joon97/show-service:latest  # GitHub Actions에서 SHA 버전으로 대체
          ports:
            - name: show-port
              containerPort: 8003
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5433"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: onevoice-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: onevoice-secret
                  key: DB_PASSWORD

            - name: CONFIG_SERVER_URL
              value: http://config-server:19000
            - name: EUREKA_HOST
              valueFrom:
                secretKeyRef:
                  name: eureka-host-secret
                  key: EUREKA_HOST

            - name: KAFKA_HOST
              value: kafka:9092

            - name: SWAGGER_URL
              value: "http://localhost:8080"
