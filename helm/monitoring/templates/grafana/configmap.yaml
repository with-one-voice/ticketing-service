apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: {{.Values.namespace}}
data:
  grafana.ini: |
    [server]
    root_url = http://localhost:{{.Values.grafana.service.port}}
    serve_from_sub_path = true

    [auth.anonymous]
    enabled = true

    [security]
    admin_user = {{.Values.grafana.admin.user}}
    admin_password = {{.Values.grafana.admin.password}}