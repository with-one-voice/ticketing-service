apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ .Values.namespace }}
data:
  loki-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: {{ .Values.loki.service.port }}

    ingester:
      wal:
        enabled: true
        dir: /etc/loki/wal
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        final_sleep: 0s
      chunk_idle_period: 5m
      max_chunk_age: 1h

    schema_config:
      configs:
        - from: 2024-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /etc/loki/index
        cache_location: /etc/loki/cache
        shared_store: filesystem
      filesystem:
        directory: /etc/loki/chunks

    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h

    compactor:
      working_directory: /etc/loki/compactor
      shared_store: filesystem
