server:
  port: 8008

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/notification_db
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:sa}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: notification-group

  zipkin:
    base-url: http://zipkin:9411  # 도커 내부 서비스명 사용
    enabled: true
    sleuth:
      sampler:
        probability: 1.0  # 전체 요청 추적 (운영은 0.1~0.3 추천)

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false

discord:
  name: ${DISCORD_NAME:final-project}
  webhook:
    url: ${DISCORD_WEBHOOK_URL:https://discord.com/api/webhooks/1361934260583530607/DzLzn23dpg725D3tPkzLk9-d7t6ckPQZHdkVJClivflDM5aNHlRoMJuWFjgsY8hJfEJm}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    path: /v3/api-docs

swagger:
  server-url: http://localhost:8080/api/notifications

management:
  endpoints:
    web:
      exposure:
        include: "prometheus"
  metrics:
    export:
      prometheus:
        enabled: true