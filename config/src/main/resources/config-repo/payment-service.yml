server:
  port: 8007

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/payment_db
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:sa}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: payment-group

  zipkin:
    base-url: http://zipkin:9411  # 도커 내부 서비스명 사용
    enabled: true
    sleuth:
      sampler:
        probability: 1.0  # 전체 요청 추적 (운영은 0.1~0.3 추천)

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    path: /v3/api-docs

swagger:
  server-url: http://localhost:8080/api/payments

management:
  endpoints:
    web:
      exposure:
        include: "prometheus"
  metrics:
    export:
      prometheus:
        enabled: true

kakaopay:
  api:
    secret:
      key: ${KAKAO_PAY_SECRET_KEY}
  cid: ${KAKAO_PAY_CID}
  host: ${KAKAO_PAY_HOST}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:eureka-server:8761}/eureka