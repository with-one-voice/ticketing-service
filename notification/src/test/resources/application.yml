spring:
  application:
    name: notification-test

  sql:
    init:
      mode: always  # schema.sql, data.sql 자동 실행

  jpa:
    hibernate:
      ddl-auto: create-drop  # 테스트마다 테이블 생성/삭제
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true  # SQL 초기화가 JPA보다 먼저 되지 않도록

  cloud:
    config:
      enabled: false  # Config Server 비활성화

  mail:
    host: localhost
    port: 25
    username: username
    password: password

  kafka:
    consumer:
      group-id: notification-group

eureka:
  client:
    enabled: false  # Eureka Client 비활성화

logging:
  level:
    root: DEBUG
    org.springframework: INFO
    com.onevoice: DEBUG

swagger:
  server-url: localhost

discord:
  name: test
  webhook:
    url: localhost
