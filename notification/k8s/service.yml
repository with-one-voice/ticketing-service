apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: onevoice
  labels:
    app: notification
spec:
  selector:
    app: notification
  ports:
    - name: metrics
      port: 8008           # 외부에서 접근할 포트
      targetPort: notif-port   # 컨테이너 내부 포트 (Deployment의 containerPort와 일치)
  type: ClusterIP        # 내부 서비스용 (기본값)
